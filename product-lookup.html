const q = document.getElementById('q');
const list = document.getElementById('list');
const count = document.getElementById('count');
const hint = document.getElementById('hint');
const toast = document.getElementById('toast');
let timer;

function esc(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render() {
  const kws = q.value.trim().toLowerCase().split(/\s+/).filter(Boolean);
  if (!kws.length) { list.innerHTML=''; count.textContent=''; hint.style.display='block'; return; }
  hint.style.display='none';
  const hits = DATA.filter(it => kws.every(k => it.n.toLowerCase().includes(k)));
  count.textContent = '找到 ' + hits.length + ' 筆' + (hits.length > 100 ? '（只顯示前 100 筆，請加關鍵字縮小範圍）' : '');
  list.innerHTML = hits.slice(0, 100).map((it, i) => `
    <div class="card">
      <div class="name">${esc(it.n)}</div>
      <div class="price">${it.p ? esc(it.p.startsWith('$') ? it.p : '$' + it.p) : ''}</div>
      <div class="btns">
        <button class="copy" onclick="doCopy('${esc(it.u)}')">📋 複製網址</button>
        <a class="open" href="${esc(it.u)}" target="_blank">↗ 打開貼文</a>
      </div>
    </div>`).join('');
}

function doCopy(url) {
  navigator.clipboard.writeText(url).then(() => {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1400);
  });
}

q.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(render, 120); });
</script>
