<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>誠萍生活家具 — 內部工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    line-height: 1.5;
  }

  /* ===== NAV BAR ===== */
  .navbar {
    background: linear-gradient(135deg, #2c3e50, #3498db);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .navbar .brand {
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
  }
  .navbar .brand span { opacity: .7; font-weight: 400; font-size: 14px; margin-left: 8px; }
  .nav-back {
    display: none;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.15);
    border: none;
    color: #fff;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }
  .nav-back:hover { background: rgba(255,255,255,.25); }
  .nav-back.show { display: flex; }

  /* ===== HOME PAGE ===== */
  .page { display: none; }
  .page.active { display: block; }

  .home-header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  .home-header h2 {
    font-size: 26px;
    color: #2c3e50;
    margin-bottom: 6px;
  }
  .home-header p { color: #777; font-size: 14px; }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  .tool-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    cursor: pointer;
    transition: all .2s;
    border: 2px solid transparent;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .tool-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,.1);
    border-color: #3498db;
  }
  .tool-card:active { transform: scale(.97); }
  .tool-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 14px;
  }
  .tool-card h3 { font-size: 17px; color: #2c3e50; margin-bottom: 6px; }
  .tool-card p { font-size: 13px; color: #888; line-height: 1.5; }
  .tool-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-internal { background: #e8f5e9; color: #2e7d32; }
  .badge-external { background: #e3f2fd; color: #1565c0; }

  .icon-warehouse { background: #fff3e0; }
  .icon-stopmotion { background: #fce4ec; }
  .icon-logo { background: #e8eaf6; }
  .icon-video { background: #e0f7fa; }
  .icon-curtain { background: #f3e5f5; }

  /* ===== WAREHOUSE PAGE ===== */
  .warehouse-header {
    background: #fff;
    padding: 16px;
    border-bottom: 1px solid #e0e0e0;
  }
  .search-box {
    display: flex;
    gap: 8px;
    max-width: 500px;
    margin: 0 auto;
  }
  .search-box input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border .2s;
  }
  .search-box input:focus { border-color: #3498db; }
  .search-box input::placeholder { color: #bbb; }
  .tabs {
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 12px 16px 0;
    flex-wrap: wrap;
  }
  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #3498db;
    background: #fff;
    color: #3498db;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .tab.active, .tab:hover { background: #3498db; color: #fff; }
  .tab .count {
    display: inline-block;
    border-radius: 10px;
    padding: 0 5px;
    font-size: 11px;
    margin-left: 3px;
  }
  .stats-bar {
    text-align: center;
    padding: 10px 16px;
    font-size: 13px;
    color: #666;
  }
  .stats-bar span { font-weight: 600; color: #2c3e50; }
  .wh-container { max-width: 800px; margin: 0 auto; padding: 4px 12px 80px; }
  .card {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 8px;
    padding: 14px 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .card.ng { border-left: 4px solid #e74c3c; }
  .card.has-note { border-left: 4px solid #f39c12; }
  .item-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .ic-glass { background: #dff0fe; }
  .ic-wood { background: #fef3e0; }
  .ic-curtain { background: #f3e5f5; }
  .item-info { flex: 1; min-width: 0; }
  .item-title { font-size: 15px; font-weight: 600; color: #2c3e50; margin-bottom: 2px; }
  .item-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-qty { background: #e8f5e9; color: #2e7d32; }
  .tag-color { background: #fff3e0; color: #e65100; }
  .tag-note { background: #fff8e1; color: #f57f17; }
  .tag-ng { background: #ffebee; color: #c62828; }
  .tag-location { background: #e3f2fd; color: #1565c0; }
  .item-num { font-size: 12px; color: #aaa; font-weight: 500; flex-shrink: 0; }
  .section-header {
    font-size: 13px;
    font-weight: 700;
    color: #999;
    letter-spacing: 1px;
    padding: 14px 4px 6px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  @media (max-width: 480px) {
    .navbar .brand { font-size: 17px; }
    .navbar .brand span { display: none; }
    .home-header h2 { font-size: 22px; }
    .tools-grid { grid-template-columns: 1fr; }
    .tool-card { padding: 18px; }
  }
</style>
</head>

const catLabel = {glass:"玻璃", wood:"木板", curtain:"窗簾+配件"};
const catIcon = {glass:"🔹", wood:"🔸", curtain:"🔮"};
const catIconClass = {glass:"ic-glass", wood:"ic-wood", curtain:"ic-curtain"};
let currentCat = "all";
let searchText = "";

function isNG(d) { return d.note && d.note.includes("NG"); }
function hasNote(d) { return d.note && !isNG(d) && d.note.length > 0; }

function highlight(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return text;
  return text.slice(0,i) + '<mark style="background:#fff176;border-radius:2px;padding:0 2px">' + text.slice(i, i+q.length) + '</mark>' + text.slice(i+q.length);
}

function renderWarehouse() {
  const q = searchText.toLowerCase();
  const all = q ? DATA.filter(d => [d.spec,d.detail,d.note,d.color,catLabel[d.cat]].join(" ").toLowerCase().includes(q)) : DATA;
  document.getElementById("cAll").textContent = all.length;
  document.getElementById("cGlass").textContent = all.filter(d=>d.cat==="glass").length;
  document.getElementById("cWood").textContent = all.filter(d=>d.cat==="wood").length;
  document.getElementById("cCurtain").textContent = all.filter(d=>d.cat==="curtain").length;

  const filtered = all.filter(d => currentCat === "all" || d.cat === currentCat);
  document.getElementById("statsBar").innerHTML = `顯示 <span>${filtered.length}</span> 筆，共 <span>${DATA.length}</span> 筆零件`;

  const el = document.getElementById("whList");
  if (!filtered.length) { el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>找不到符合的零件</p></div>'; return; }

  let html = "";
  const order = currentCat === "all" ? ["glass","wood","curtain"] : [currentCat];
  for (const cat of order) {
    const items = filtered.filter(d => d.cat === cat);
    if (!items.length) continue;
    if (currentCat === "all") html += `<div class="section-header">${catIcon[cat]} ${catLabel[cat]}（${items.length}）</div>`;
    for (const d of items) {
      const cls = isNG(d) ? " ng" : hasNote(d) ? " has-note" : "";
      let tags = `<span class="tag tag-qty">× ${d.qty}</span>`;
      if (d.color) tags += `<span class="tag tag-color">${d.color}</span>`;
      if (isNG(d)) tags += `<span class="tag tag-ng">⚠ NG</span>`;
      else if (d.note) {
        if (d.note.match(/礁溪|桃園|師大/)) tags += `<span class="tag tag-location">📍 ${d.note}</span>`;
        else tags += `<span class="tag tag-note">📝 ${d.note}</span>`;
      }
      const title = d.detail ? `${d.spec}　${d.detail}` : d.spec;
      html += `<div class="card${cls}"><div class="item-icon ${catIconClass[cat]}">${catIcon[cat]}</div><div class="item-info"><div class="item-title">${highlight(title,q)}</div><div class="item-tags">${tags}</div></div><div class="item-num">#${d.no}</div></div>`;
    }
  }
  el.innerHTML = html;
}

document.getElementById("searchInput").addEventListener("input", e => { searchText = e.target.value.trim(); renderWarehouse(); });
document.getElementById("tabs").addEventListener("click", e => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  currentCat = tab.dataset.cat;
  renderWarehouse();
});
</script>
</body>
</html>
